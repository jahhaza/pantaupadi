<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PantauPadi - PantauRawan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="logo"><i class="fas fa-seedling"></i><span>PantauPadi</span></div>
        <nav class="nav-menu">
          <a href="index.html" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
          <a href="pantaumap.html" class="nav-item"><i class="fas fa-map-marked-alt"></i><span>PantauMap</span></a>
          <a href="pantaurend.html" class="nav-item"><i class="fas fa-chart-line"></i><span>PantauTrend</span></a>
          <a href="pantauburamalan.html" class="nav-item"><i class="fas fa-cloud-sun-rain"></i><span>PantauRamalan</span></a>
          <a href="pantaurawan.html" class="nav-item active"><i class="fas fa-exclamation-triangle"></i><span>PantauRawan</span></a>
          <a href="pantauaksi.html" class="nav-item"><i class="fas fa-hands-helping"></i><span>PantauAksi</span></a>
        </nav>
        <div class="sidebar-footer">
          <div class="status-badge"><i class="fas fa-circle"></i><span>Sistem Aktif</span></div>
          <div class="version">v2.0 Intelligence</div>
        </div>
      </aside>
      <main class="main-content">
        <header class="content-header">
          <div class="header-title">
            <h1>PantauRawan</h1>
            <p>5 wilayah dengan risiko tertinggi</p>
          </div>
          <div class="header-actions">
            <div class="date-time" id="currentDateTime"></div>
            <button class="refresh-btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i></button>
          </div>
        </header>
        <div class="page-content">
          <div class="list-container"><ul class="custom-list" id="rawanList"></ul></div>
        </div>
      </main>
    </div>
    <script src="app.js"></script>
    <script>
      function initRawan(data) {
        const top5 = [...data.current].sort((a, b) => b.final_score - a.final_score).slice(0, 5);
        document.getElementById("rawanList").innerHTML = top5
          .map((d, i) => `<li><span>${i + 1}. ${d.wilayah}</span><span><span class="risk-badge risk-${d.risk_label}">${d.risk_label.toUpperCase()}</span> Score: ${d.final_score}</span></li>`)
          .join("");
      }
      window.onDataLoad = initRawan;
      function updateDateTime() {
        const n = new Date();
        document.getElementById("currentDateTime").innerHTML = n.toLocaleDateString("id-ID") + " | " + n.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" });
      }
      updateDateTime();
      setInterval(updateDateTime, 60000);
    </script>
  </body>
</html>
